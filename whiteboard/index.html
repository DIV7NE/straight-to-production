<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STP Whiteboard</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .status-dot.idle { background: var(--text-muted); animation: none; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }

    nav button {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }

    nav button:hover { color: var(--text); }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

    .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

    .section { display: none; animation: fadeIn 0.2s ease; }
    .section.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .card-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
    .card-text { font-size: 14px; line-height: 1.6; color: var(--text-muted); }

    .diagram-container {
      position: relative;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin: 16px 0;
      overflow-x: auto;
      display: flex;
      justify-content: center;
    }

    .diagram-label {
      font-size: 14px;
      font-weight: 600;
      margin: 16px 0 8px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-green { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .badge-yellow { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
    .badge-blue { background: rgba(59, 130, 246, 0.15); color: var(--accent); }

    .milestone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .milestone-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .milestone-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .check-box {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
    }

    .feature-item.done .check-box {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .feature-item.done { color: var(--text); }

    /* Design System Preview */
    .design-preview { display: grid; gap: 20px; }

    .design-style-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .design-style-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .design-style-keywords {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .design-style-best {
      font-size: 13px;
      color: var(--accent);
    }

    .color-palette {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .color-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .color-swatch-circle {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 2px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .color-swatch-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }

    .color-swatch-hex {
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .typography-preview {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-top: 12px;
    }

    .font-sample-heading {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .font-sample-body {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-muted);
      max-width: 600px;
    }

    .font-meta {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .font-meta span { display: flex; align-items: center; gap: 4px; }

    .layout-sections {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 12px;
    }

    .layout-section-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
    }

    .layout-section-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .avoid-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .avoid-tag {
      padding: 4px 10px;
      background: rgba(239, 68, 68, 0.12);
      color: var(--red);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .effects-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .effect-tag {
      padding: 4px 10px;
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .design-subsection-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* Export UI */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .export-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .export-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }

    .export-btn svg { width: 14px; height: 14px; }

    .diagram-export-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, border-color 0.15s, color 0.15s;
      z-index: 10;
    }

    .diagram-container:hover .diagram-export-btn { opacity: 1; }

    .diagram-export-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .diagram-export-btn svg { width: 16px; height: 16px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 12px 0;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">P</div>
      <span>STP Whiteboard</span>
    </div>
    <div class="header-actions">
      <button class="export-btn" id="exportBtn" onclick="exportWhiteboard()" title="Export as self-contained HTML">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0l-3-3m3 3l3-3M3 13h10"/></svg>
        Export
      </button>
      <div class="status">
        <div class="status-dot idle" id="statusDot"></div>
        <span id="statusText">Waiting for data...</span>
      </div>
    </div>
  </header>

  <nav id="nav"></nav>

  <div class="content" id="content">
    <div class="empty-state">
      <h3>Whiteboard is ready</h3>
      <p>Run /stp:think --plan or /stp:think --whiteboard — diagrams will appear here live.</p>
    </div>
  </div>

  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#1e1e1e',
        primaryColor: '#3b82f6',
        primaryTextColor: '#e4e4e7',
        primaryBorderColor: '#2a2a2a',
        lineColor: '#71717a',
        secondaryColor: '#1e3a5f',
        tertiaryColor: '#141414',
        fontFamily: '-apple-system, BlinkMacSystemFont, system-ui, sans-serif',
        fontSize: '14px',
      }
    });

    let currentSection = null;
    let lastHash = null;

    function sanitize(str) {
      return DOMPurify.sanitize(str, { ALLOWED_TAGS: [], ALLOWED_ATTR: [] });
    }

    function sanitizeHtml(str) {
      return DOMPurify.sanitize(str, {
        ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'code', 'br', 'p', 'ul', 'ol', 'li', 'a', 'h3', 'h4'],
        ALLOWED_ATTR: ['href']
      });
    }

    async function renderMermaid(container) {
      const blocks = container.querySelectorAll('.mermaid-source');
      for (const block of blocks) {
        const code = block.textContent.trim();
        const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
        try {
          const { svg } = await mermaid.render(id, code);
          const wrapper = document.createElement('div');
          wrapper.className = 'diagram-container';
          // Mermaid SVG is trusted output from the library
          wrapper.appendChild(new DOMParser().parseFromString(svg, 'image/svg+xml').documentElement);
          var dlBtn = document.createElement('button');
          dlBtn.className = 'diagram-export-btn';
          dlBtn.title = 'Download SVG';
          var dlIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          dlIcon.setAttribute('viewBox', '0 0 16 16');
          dlIcon.setAttribute('fill', 'none');
          dlIcon.setAttribute('stroke', 'currentColor');
          dlIcon.setAttribute('stroke-width', '1.5');
          var dlPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          dlPath.setAttribute('d', 'M8 2v8m0 0l-3-3m3 3l3-3M3 13h10');
          dlIcon.appendChild(dlPath);
          dlBtn.appendChild(dlIcon);
          dlBtn.addEventListener('click', function() { downloadSvg(wrapper); });
          wrapper.appendChild(dlBtn);
          block.replaceWith(wrapper);
        } catch (e) {
          const errMsg = document.createElement('pre');
          errMsg.style.cssText = 'color: var(--red); font-size: 12px;';
          errMsg.textContent = 'Diagram error: ' + e.message;
          block.replaceWith(errMsg);
        }
      }
    }

    function buildNav(sections) {
      const nav = document.getElementById('nav');
      while (nav.firstChild) nav.removeChild(nav.firstChild);
      sections.forEach(function(section, i) {
        const btn = document.createElement('button');
        btn.textContent = section.title;
        btn.addEventListener('click', function() { switchSection(i, sections); });
        if (currentSection === section.title || (!currentSection && i === 0)) {
          btn.classList.add('active');
        }
        nav.appendChild(btn);
      });
    }

    function switchSection(index, sections) {
      currentSection = sections[index].title;
      document.querySelectorAll('nav button').forEach(function(b, i) {
        b.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.section').forEach(function(s, i) {
        s.classList.toggle('active', i === index);
      });
    }

    function buildFeatureItem(name, done) {
      const item = document.createElement('div');
      item.className = 'feature-item' + (done ? ' done' : '');

      const check = document.createElement('div');
      check.className = 'check-box';
      if (done) check.textContent = '\u2713';

      const label = document.createElement('span');
      label.textContent = name;

      item.appendChild(check);
      item.appendChild(label);
      return item;
    }

    function buildTable(tableData) {
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      tableData.headers.forEach(function(h) {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      tableData.rows.forEach(function(row) {
        const tr = document.createElement('tr');
        row.forEach(function(cell) {
          const td = document.createElement('td');
          td.textContent = cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      return table;
    }

    function renderDesignSystem(ds) {
      const preview = document.createElement('div');
      preview.className = 'design-preview';

      // Style card
      if (ds.style) {
        const styleCard = document.createElement('div');
        styleCard.className = 'design-style-card';
        const label = document.createElement('div');
        label.className = 'design-subsection-title';
        label.textContent = 'Recommended Style';
        styleCard.appendChild(label);
        const name = document.createElement('div');
        name.className = 'design-style-name';
        name.textContent = ds.style.name || '';
        styleCard.appendChild(name);
        if (ds.style.keywords) {
          const kw = document.createElement('div');
          kw.className = 'design-style-keywords';
          kw.textContent = ds.style.keywords;
          styleCard.appendChild(kw);
        }
        if (ds.style.bestFor) {
          const bf = document.createElement('div');
          bf.className = 'design-style-best';
          bf.textContent = 'Best for: ' + ds.style.bestFor;
          styleCard.appendChild(bf);
        }
        preview.appendChild(styleCard);
      }

      // Color palette
      if (ds.colors && ds.colors.length) {
        const colorCard = document.createElement('div');
        colorCard.className = 'design-style-card';
        const label = document.createElement('div');
        label.className = 'design-subsection-title';
        label.textContent = 'Color Palette';
        colorCard.appendChild(label);
        if (ds.colorNotes) {
          const notes = document.createElement('div');
          notes.style.cssText = 'font-size:13px;color:var(--text-muted);margin-bottom:12px';
          notes.textContent = ds.colorNotes;
          colorCard.appendChild(notes);
        }
        const palette = document.createElement('div');
        palette.className = 'color-palette';
        ds.colors.forEach(function(c) {
          const swatch = document.createElement('div');
          swatch.className = 'color-swatch';
          const circle = document.createElement('div');
          circle.className = 'color-swatch-circle';
          circle.style.background = c.hex;
          swatch.appendChild(circle);
          const lbl = document.createElement('div');
          lbl.className = 'color-swatch-label';
          lbl.textContent = c.name;
          swatch.appendChild(lbl);
          const hex = document.createElement('div');
          hex.className = 'color-swatch-hex';
          hex.textContent = (c.hex || '') + (c.label ? ' \u00b7 ' + c.label : '');
          swatch.appendChild(hex);
          palette.appendChild(swatch);
        });
        colorCard.appendChild(palette);
        preview.appendChild(colorCard);
      }

      // Typography
      if (ds.typography) {
        const typoCard = document.createElement('div');
        typoCard.className = 'design-style-card';
        const label = document.createElement('div');
        label.className = 'design-subsection-title';
        label.textContent = 'Typography';
        typoCard.appendChild(label);
        const typoPreview = document.createElement('div');
        typoPreview.className = 'typography-preview';
        if (ds.typography.heading) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://fonts.googleapis.com/css2?family=' +
            encodeURIComponent(ds.typography.heading).replace(/%20/g, '+') + ':wght@400;700&family=' +
            encodeURIComponent(ds.typography.body || ds.typography.heading).replace(/%20/g, '+') + ':wght@400;500&display=swap';
          document.head.appendChild(link);
        }
        const heading = document.createElement('div');
        heading.className = 'font-sample-heading';
        heading.style.fontFamily = '"' + (ds.typography.heading || 'inherit') + '", serif';
        heading.textContent = ds.projectName || 'Your Project Name';
        typoPreview.appendChild(heading);
        const body = document.createElement('div');
        body.className = 'font-sample-body';
        body.style.fontFamily = '"' + (ds.typography.body || 'inherit') + '", sans-serif';
        body.textContent = 'The quick brown fox jumps over the lazy dog. This is how your body text will look across your application with the recommended font pairing.';
        typoPreview.appendChild(body);
        const meta = document.createElement('div');
        meta.className = 'font-meta';
        var headingSpan = document.createElement('span');
        headingSpan.textContent = 'Heading: ' + (ds.typography.heading || '\u2014');
        meta.appendChild(headingSpan);
        var bodySpan = document.createElement('span');
        bodySpan.textContent = 'Body: ' + (ds.typography.body || '\u2014');
        meta.appendChild(bodySpan);
        if (ds.typography.mood) {
          var moodSpan = document.createElement('span');
          moodSpan.textContent = 'Mood: ' + ds.typography.mood;
          meta.appendChild(moodSpan);
        }
        typoPreview.appendChild(meta);
        typoCard.appendChild(typoPreview);
        preview.appendChild(typoCard);
      }

      // Layout pattern
      if (ds.layout) {
        const layoutCard = document.createElement('div');
        layoutCard.className = 'design-style-card';
        const label = document.createElement('div');
        label.className = 'design-subsection-title';
        label.textContent = 'Layout Pattern';
        layoutCard.appendChild(label);
        if (ds.layout.pattern) {
          const patternName = document.createElement('div');
          patternName.style.cssText = 'font-size:15px;font-weight:600;margin-bottom:8px';
          patternName.textContent = ds.layout.pattern;
          layoutCard.appendChild(patternName);
        }
        if (ds.layout.sections && ds.layout.sections.length) {
          const list = document.createElement('div');
          list.className = 'layout-sections';
          ds.layout.sections.forEach(function(s, i) {
            const item = document.createElement('div');
            item.className = 'layout-section-item';
            const num = document.createElement('div');
            num.className = 'layout-section-num';
            num.textContent = i + 1;
            item.appendChild(num);
            const nameSp = document.createElement('span');
            nameSp.textContent = s;
            item.appendChild(nameSp);
            list.appendChild(item);
          });
          layoutCard.appendChild(list);
        }
        preview.appendChild(layoutCard);
      }

      // Effects
      if (ds.effects && ds.effects.length) {
        const effectCard = document.createElement('div');
        effectCard.className = 'design-style-card';
        const label = document.createElement('div');
        label.className = 'design-subsection-title';
        label.textContent = 'Key Effects';
        effectCard.appendChild(label);
        const list = document.createElement('div');
        list.className = 'effects-list';
        ds.effects.forEach(function(e) {
          const tag = document.createElement('span');
          tag.className = 'effect-tag';
          tag.textContent = e;
          list.appendChild(tag);
        });
        effectCard.appendChild(list);
        preview.appendChild(effectCard);
      }

      // Anti-patterns
      if (ds.avoid && ds.avoid.length) {
        const avoidCard = document.createElement('div');
        avoidCard.className = 'design-style-card';
        const label = document.createElement('div');
        label.className = 'design-subsection-title';
        label.textContent = 'Avoid (Anti-patterns)';
        avoidCard.appendChild(label);
        const list = document.createElement('div');
        list.className = 'avoid-list';
        ds.avoid.forEach(function(a) {
          const tag = document.createElement('span');
          tag.className = 'avoid-tag';
          tag.textContent = a;
          list.appendChild(tag);
        });
        avoidCard.appendChild(list);
        preview.appendChild(avoidCard);
      }

      return preview;
    }

    function renderSection(section) {
      const card = document.createElement('div');
      card.className = 'card';

      const title = document.createElement('h2');
      title.className = 'card-title';
      title.textContent = section.title;
      card.appendChild(title);

      if (section.subtitle) {
        const sub = document.createElement('p');
        sub.className = 'card-subtitle';
        sub.textContent = section.subtitle;
        card.appendChild(sub);
      }

      if (section.designSystem) {
        card.appendChild(renderDesignSystem(section.designSystem));
      }

      if (section.content) {
        const contentDiv = document.createElement('div');
        contentDiv.className = 'card-text';
        contentDiv.appendChild(
          new DOMParser().parseFromString(
            '<div>' + DOMPurify.sanitize(section.content, {
              ALLOWED_TAGS: ['b','i','em','strong','code','br','p','ul','ol','li','a','h3','h4'],
              ALLOWED_ATTR: ['href']
            }) + '</div>', 'text/html'
          ).body.firstChild
        );
        card.appendChild(contentDiv);
      }

      if (section.diagrams) {
        section.diagrams.forEach(function(d) {
          if (d.label) {
            const label = document.createElement('div');
            label.className = 'diagram-label';
            label.textContent = d.label;
            card.appendChild(label);
          }
          const source = document.createElement('div');
          source.className = 'mermaid-source';
          source.textContent = d.code;
          card.appendChild(source);
        });
      }

      if (section.table) {
        card.appendChild(buildTable(section.table));
      }

      if (section.milestones) {
        const grid = document.createElement('div');
        grid.className = 'milestone-grid';
        section.milestones.forEach(function(m) {
          const mCard = document.createElement('div');
          mCard.className = 'milestone-card';

          const done = m.features.filter(function(f) { return f.done; }).length;
          const total = m.features.length;
          const badgeClass = done === total ? 'badge-green' : done > 0 ? 'badge-yellow' : 'badge-blue';

          const h4 = document.createElement('h4');
          h4.textContent = m.name + ' ';
          const badge = document.createElement('span');
          badge.className = 'badge ' + badgeClass;
          badge.textContent = done + '/' + total;
          h4.appendChild(badge);
          mCard.appendChild(h4);

          if (m.goal) {
            const goal = document.createElement('p');
            goal.style.cssText = 'font-size:13px;color:var(--text-muted);margin-bottom:8px';
            goal.textContent = m.goal;
            mCard.appendChild(goal);
          }

          m.features.forEach(function(f) {
            mCard.appendChild(buildFeatureItem(f.name, f.done));
          });

          grid.appendChild(mCard);
        });
        card.appendChild(grid);
      }

      return card;
    }

    function downloadSvg(container) {
      var svg = container.querySelector('svg:not(.diagram-export-btn svg)');
      if (!svg) return;
      var label = container.previousElementSibling;
      var name = (label && label.classList.contains('diagram-label'))
        ? label.textContent.trim().replace(/[^a-zA-Z0-9\-_ ]/g, '').replace(/\s+/g, '-').toLowerCase()
        : 'diagram';
      var svgClone = svg.cloneNode(true);
      svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      // Inject dark background so SVG renders correctly standalone
      var bgStyle = document.createElementNS('http://www.w3.org/2000/svg', 'style');
      bgStyle.textContent = 'svg { background: #1e1e1e; }';
      svgClone.insertBefore(bgStyle, svgClone.firstChild);
      var svgData = new XMLSerializer().serializeToString(svgClone);
      var blob = new Blob([svgData], { type: 'image/svg+xml' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'stp-' + name + '.svg';
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportWhiteboard() {
      var nav = document.getElementById('nav');
      var content = document.getElementById('content');
      if (!nav.children.length) return;

      var css = document.querySelector('style').textContent;
      var date = new Date().toISOString().slice(0, 10);
      var status = document.getElementById('statusText').textContent;

      // Capture Google Font links for design system typography
      var fontLinks = '';
      document.querySelectorAll('link[href*="fonts.googleapis"]').forEach(function(link) {
        fontLinks += '  <link rel="stylesheet" href="' + link.getAttribute('href') + '">\n';
      });

      // Clone content and strip export buttons for clean output
      var contentClone = content.cloneNode(true);
      contentClone.querySelectorAll('.diagram-export-btn').forEach(function(btn) { btn.remove(); });

      var html = '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
        + '  <meta charset="UTF-8">\n'
        + '  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
        + '  <title>STP Whiteboard \u2014 ' + sanitize(status) + '</title>\n'
        + fontLinks
        + '  <style>' + css + '\n'
        + '    .export-btn { display: none; }\n'
        + '    .status-dot { animation: none; background: var(--text-muted); }\n'
        + '  </style>\n'
        + '</head>\n<body>\n'
        + '  <header>\n'
        + '    <div class="logo">\n'
        + '      <div class="logo-icon">P</div>\n'
        + '      <span>STP Whiteboard</span>\n'
        + '    </div>\n'
        + '    <div class="status">\n'
        + '      <div class="status-dot idle"></div>\n'
        + '      <span>' + sanitize(status) + ' \u2014 exported ' + date + '</span>\n'
        + '    </div>\n'
        + '  </header>\n'
        + '  <nav id="nav">' + nav.innerHTML + '</nav>\n'
        + '  <div class="content" id="content">' + contentClone.innerHTML + '</div>\n'
        + '  <script>\n'
        + '    document.querySelectorAll("nav button").forEach(function(btn, i) {\n'
        + '      btn.addEventListener("click", function() {\n'
        + '        document.querySelectorAll("nav button").forEach(function(b, j) {\n'
        + '          b.classList.toggle("active", j === i);\n'
        + '        });\n'
        + '        document.querySelectorAll(".section").forEach(function(s, j) {\n'
        + '          s.classList.toggle("active", j === i);\n'
        + '        });\n'
        + '      });\n'
        + '    });\n'
        + '  <\/script>\n'
        + '</body>\n</html>';

      var blob = new Blob([html], { type: 'text/html' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'stp-whiteboard-' + date + '.html';
      a.click();
      URL.revokeObjectURL(url);
    }

    async function loadData() {
      try {
        var resp = await fetch('/data.json?t=' + Date.now());
        if (!resp.ok) return;

        var data = await resp.json();
        var hash = JSON.stringify(data);
        if (hash === lastHash) return;
        lastHash = hash;

        var dot = document.getElementById('statusDot');
        var statusEl = document.getElementById('statusText');

        dot.classList.remove('idle');
        statusEl.textContent = data.status || 'Live';

        if (data.sections && data.sections.length > 0) {
          buildNav(data.sections);
          var content = document.getElementById('content');
          while (content.firstChild) content.removeChild(content.firstChild);

          data.sections.forEach(function(s, i) {
            var wrapper = document.createElement('div');
            wrapper.className = 'section';
            if (currentSection === s.title || (!currentSection && i === 0)) {
              wrapper.classList.add('active');
            }
            wrapper.appendChild(renderSection(s));
            content.appendChild(wrapper);
          });

          await renderMermaid(content);
        }
      } catch (e) {
        // Server not ready or no data yet
      }
    }

    loadData();
    setInterval(loadData, 2000);
  </script>
</body>
</html>
